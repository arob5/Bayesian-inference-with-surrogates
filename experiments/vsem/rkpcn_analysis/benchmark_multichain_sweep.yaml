# Multi-chain adaptive RKPCN: sweep rho with 1 and 20 u-steps.
# All variants use 4 chains with adaptive proposals and Pritchard weighting.
#
# Usage:
#   cd experiments/vsem
#   qsub -v CONFIG=rkpcn_analysis/benchmark_multichain_sweep.yaml \
#     rkpcn_analysis/submit_benchmark.sh

common_kwargs:
  n_total: 55000
  n_burnin: 50000
  n_chains: 4
  adaptive: true
  adapt_interval: 50
  target_accept: 0.234
  weight_method: pritchard
  init_method: high_density_spread

variants:
  # === 4 chains, 1 u-step ===
  - label: rho0_4ch_u1
    rho: 0.0
  - label: rho10_4ch_u1
    rho: 0.1
  - label: rho20_4ch_u1
    rho: 0.2
  - label: rho30_4ch_u1
    rho: 0.3
  - label: rho40_4ch_u1
    rho: 0.4
  - label: rho50_4ch_u1
    rho: 0.5
  - label: rho60_4ch_u1
    rho: 0.6
  - label: rho70_4ch_u1
    rho: 0.7
  - label: rho80_4ch_u1
    rho: 0.8
  - label: rho90_4ch_u1
    rho: 0.9
  - label: rho95_4ch_u1
    rho: 0.95
  - label: rho99_4ch_u1
    rho: 0.99

  # === 4 chains, 20 u-steps ===
  - label: rho0_4ch_u20
    rho: 0.0
    n_u_steps: 20
  - label: rho10_4ch_u20
    rho: 0.1
    n_u_steps: 20
  - label: rho20_4ch_u20
    rho: 0.2
    n_u_steps: 20
  - label: rho30_4ch_u20
    rho: 0.3
    n_u_steps: 20
  - label: rho40_4ch_u20
    rho: 0.4
    n_u_steps: 20
  - label: rho50_4ch_u20
    rho: 0.5
    n_u_steps: 20
  - label: rho60_4ch_u20
    rho: 0.6
    n_u_steps: 20
  - label: rho70_4ch_u20
    rho: 0.7
    n_u_steps: 20
  - label: rho80_4ch_u20
    rho: 0.8
    n_u_steps: 20
  - label: rho90_4ch_u20
    rho: 0.9
    n_u_steps: 20
  - label: rho95_4ch_u20
    rho: 0.95
    n_u_steps: 20
  - label: rho99_4ch_u20
    rho: 0.99
    n_u_steps: 20
