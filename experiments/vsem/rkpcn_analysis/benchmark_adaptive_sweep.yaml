# Adaptive RKPCN benchmark: sweep over rho values with 1 and 5 u-steps.
#
# Usage:
#   cd experiments/vsem
#   qsub -v CONFIG=rkpcn_analysis/benchmark_adaptive_sweep.yaml \
#     rkpcn_analysis/submit_benchmark.sh

common_kwargs:
  n_total: 55000
  n_burnin: 50000
  adaptive: true
  adapt_interval: 50
  target_accept: 0.234

variants:
  # === Single u-step ===
  - label: rho0_u1
    rho: 0.0
  - label: rho10_u1
    rho: 0.1
  - label: rho20_u1
    rho: 0.2
  - label: rho30_u1
    rho: 0.3
  - label: rho40_u1
    rho: 0.4
  - label: rho50_u1
    rho: 0.5
  - label: rho60_u1
    rho: 0.6
  - label: rho70_u1
    rho: 0.7
  - label: rho80_u1
    rho: 0.8
  - label: rho90_u1
    rho: 0.9
  - label: rho95_u1
    rho: 0.95
  - label: rho99_u1
    rho: 0.99

  # === Five u-steps ===
  - label: rho0_u5
    rho: 0.0
    n_u_steps: 5
  - label: rho10_u5
    rho: 0.1
    n_u_steps: 5
  - label: rho20_u5
    rho: 0.2
    n_u_steps: 5
  - label: rho30_u5
    rho: 0.3
    n_u_steps: 5
  - label: rho40_u5
    rho: 0.4
    n_u_steps: 5
  - label: rho50_u5
    rho: 0.5
    n_u_steps: 5
  - label: rho60_u5
    rho: 0.6
    n_u_steps: 5
  - label: rho70_u5
    rho: 0.7
    n_u_steps: 5
  - label: rho80_u5
    rho: 0.8
    n_u_steps: 5
  - label: rho90_u5
    rho: 0.9
    n_u_steps: 5
  - label: rho95_u5
    rho: 0.95
    n_u_steps: 5
  - label: rho99_u5
    rho: 0.99
    n_u_steps: 5
