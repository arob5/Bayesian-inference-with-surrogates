# Example benchmark configuration for RKPCN variant comparison.
#
# Usage:
#   cd experiments/vsem
#   python -m rkpcn_analysis.benchmark \
#       --experiment-name vsem \
#       --setup clip_gp_N4 --rep 0 \
#       --config rkpcn_analysis/example_benchmark.yaml \
#       --output-dir ../../out/vsem/benchmarks/clip_gp_N4_rep0

# Kwargs applied to all variants (overridden by per-variant settings)
common_kwargs:
  n_total: 55000
  n_burnin: 50000

# Each variant must have a unique 'label'. Supported keys:
#   label, rho, n_u_steps, prop_cov_scale, n_total, n_burnin
variants:
  # --- Baseline rho sweep ---
  - label: cut
    rho: 0.0

  - label: rho90
    rho: 0.9

  - label: rho95
    rho: 0.95

  - label: rho99
    rho: 0.99

  # --- Multi-u-steps ---
  - label: rho99_u3
    rho: 0.99
    n_u_steps: 3

  - label: rho99_u5
    rho: 0.99
    n_u_steps: 5

  # --- Proposal scale sweep (rho=0.99) ---
  - label: rho99_s0.1
    rho: 0.99
    prop_cov_scale: 0.1

  - label: rho99_s0.5
    rho: 0.99
    prop_cov_scale: 0.5

  - label: rho99_s2.0
    rho: 0.99
    prop_cov_scale: 2.0
